services:
  cv_fabien_nginx:
    container_name: "cv_fabien_nginx"
    image: ghcr.io/fabien-crovetti/cv/nginx:latest
    networks:
      - cv_fabien_network
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cv.rule=Host(`fabien.crovetti.dev`)"
      - "traefik.http.routers.cv.entrypoints=websecure"
      - "traefik.http.routers.cv.tls=true"
      - "traefik.http.routers.cv.tls.certresolver=myresolver"
      - "traefik.http.services.cv.loadbalancer.server.port=80"
      - "traefik.docker.network=web"

networks:
  cv_fabien_network:
  web:
    external: true